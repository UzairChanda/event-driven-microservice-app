server:
  port: 8084


spring:
  application:
    name: API-GATEWAY

  cloud:
    gateway:
      routes:
        - id: USERS-NEXUS
          uri: lb://USERS-NEXUS
          predicates:
            - Path=/ /**
        - id: RATINGS-NEXUS
          uri: lb://RATINGS-NEXUS
          predicates:
            - Path=/ratings/**
        - id: HOTEL-NEXUS
          uri: lb://HOTEL-NEXUS
          predicates:
            - Path=/hotels/**


eureka:
  instance:
    prefer-ip-address: true
    client:
      fetch-registry: true
      register-with-eureka: true
      service-url:
        default-zone: http://localhost:8761/eureka